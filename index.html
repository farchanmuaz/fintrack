<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>fintrack</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="app.css" />
<style>
  @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="prototype-shared.jsx"></script>
<script type="text/babel" src="screen-home.jsx"></script>
<script type="text/babel" src="screen-add.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const TWEAK_DEFAULTS = {
  "theme": "dark",
  "palette": { "value": "hot", "color": "#ff2d8f" },
  "density": "comfortable"
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tab, setTab] = useState('home');
  const [showAdd, setShowAdd] = useState(false);
  const [selectedDay, setSelectedDay] = useState(null);
  const [currentMonth, setCurrentMonth] = useState(() => {
    const d = new Date();
    return new Date(d.getFullYear(), d.getMonth(), 1);
  });
  const [expenses, setExpenses] = useState(() => buildSeed());
  const [recentlyAddedId, setRecentlyAddedId] = useState(null);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', t.theme);
    // palette may be a {value, color} object or a plain string
    const paletteName = t.palette && typeof t.palette === 'object' ? t.palette.value : t.palette;
    document.documentElement.setAttribute('data-palette', paletteName);
  }, [t]);

  const handleSave = (data) => {
    const next = { id: Date.now(), ...data };
    setExpenses(prev => [next, ...prev]);
    setRecentlyAddedId(next.id);
    setShowAdd(false);
    // jump to month of new expense
    const d = new Date(data.date + 'T12:00:00');
    setCurrentMonth(new Date(d.getFullYear(), d.getMonth(), 1));
    setTab('home');
    setTimeout(() => setRecentlyAddedId(null), 1200);
  };

  const handleChangeMonth = (delta) => {
    setCurrentMonth(prev => new Date(prev.getFullYear(), prev.getMonth() + delta, 1));
  };

  return (
    <div className="phone-stage">
      <div className="phone">
        <div className="notch"></div>
        <div className="phone-screen">
          <StatusBar />
          {tab === 'home' && (
            <HomeScreen
              expenses={expenses}
              currentMonth={currentMonth}
              onChangeMonth={handleChangeMonth}
              onSelectDay={(d) => setSelectedDay(d)}
              recentlyAddedId={recentlyAddedId}
            />
          )}
          {tab === 'list' && <ListScreen expenses={expenses} />}
          {tab === 'stats' && <StubScreen title="Stats" />}
          {tab === 'me' && <StubScreen title="Profile" />}
          <TabBar active={tab} onChange={setTab} onAdd={() => setShowAdd(true)} />

          {showAdd && (
            <AddSheet
              onClose={() => setShowAdd(false)}
              onSave={handleSave}
            />
          )}
          {selectedDay !== null && (
            <DaySheet
              day={selectedDay}
              currentMonth={currentMonth}
              expenses={expenses}
              onClose={() => setSelectedDay(null)}
            />
          )}
        </div>
        <div className="home-indicator"></div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakRadio
            label="Mode"
            value={t.theme}
            onChange={(v) => setTweak('theme', v)}
            options={[
              { value: 'light', label: 'Light' },
              { value: 'dark', label: 'Dark' },
            ]}
          />
        </TweakSection>
        <TweakSection title="Brand color">
          <TweakColor
            label="Accent"
            value={t.palette}
            onChange={(v) => setTweak('palette', v)}
            options={[
              { value: 'coral',  color: '#ff5a1f' },
              { value: 'mint',   color: '#00b87a' },
              { value: 'indigo', color: '#5a4fff' },
              { value: 'hot',    color: '#ff2d8f' },
            ]}
          />
        </TweakSection>
        <TweakSection title="Reset">
          <TweakButton onClick={() => {
            const seed = buildSeed();
            setExpenses(seed);
            setRecentlyAddedId(null);
          }}>Regenerate sample data</TweakButton>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
